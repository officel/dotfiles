# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

# home ディレクトリに配置してグローバルな作業を行う
# リポジトリに既に taskfile が存在する場合は `t -g` で呼べる

# vars:

tasks:
  default:
    cmds:
      - echo "This is {{.TASKFILE}} at v{{.TASK_VERSION}}"
      - task --list --sort alphanumeric -t {{.TASKFILE}}
    silent: true
